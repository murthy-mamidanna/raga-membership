<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raga Club of Connecticut – Member Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #E8850A;
    --saffron-light: #F5A623;
    --saffron-pale: #FDF3E3;
    --deep: #1A0A00;
    --cream: #FBF6EE;
    --green: #1E7B3A;
    --green-bg: #EAF7EE;
    --red: #B91C1C;
    --red-bg: #FEF2F2;
    --text: #2C1A08;
    --muted: #7A5C3A;
    --border: rgba(232, 133, 10, 0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--cream);
    min-height: 100vh;
    color: var(--text);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(232,133,10,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(232,133,10,0.06) 0%, transparent 50%);
  }

  /* Decorative top border */
  .top-border {
    height: 5px;
    background: linear-gradient(90deg, var(--saffron), var(--saffron-light), var(--saffron));
  }

  header {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 24px 20px;
    text-align: center;
    position: relative;
  }

  .logo-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 8px;
  }

  .logo-img {
    width: 70px;
    height: 70px;
    object-fit: contain;
    border-radius: 50%;
    border: 2px solid var(--border);
  }

  .logo-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--deep);
    line-height: 1.2;
  }

  .logo-text p {
    font-size: 0.9rem;
    color: var(--muted);
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.03em;
  }

  /* Decorative divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 6px auto 0;
    max-width: 300px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--saffron));
  }
  .divider::after { background: linear-gradient(to left, transparent, var(--saffron)); }
  .divider span { color: var(--saffron); font-size: 1rem; }

  .subtitle {
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Crimson Pro', serif;
    font-weight: 300;
    margin-top: 4px;
  }

  /* Main container */
  .container {
    max-width: 520px;
    margin: 40px auto;
    padding: 0 16px 60px;
  }

  .card {
    background: white;
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 36px 32px;
    box-shadow: 0 4px 24px rgba(139, 80, 0, 0.08);
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    color: var(--deep);
    margin-bottom: 6px;
    text-align: center;
  }

  .card-sub {
    text-align: center;
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 28px;
    font-style: italic;
    font-weight: 300;
  }

  .field-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 600;
  }

  input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid rgba(139, 80, 0, 0.2);
    border-radius: 10px;
    font-family: 'Crimson Pro', serif;
    font-size: 1.05rem;
    color: var(--text);
    background: var(--saffron-pale);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--saffron);
    box-shadow: 0 0 0 3px rgba(232, 133, 10, 0.12);
    background: white;
  }

  input::placeholder { color: #BBA882; font-style: italic; }

  .name-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .divider-or {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 4px 0 16px;
    position: relative;
  }
  .divider-or::before, .divider-or::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: var(--border);
  }
  .divider-or::before { left: 0; }
  .divider-or::after { right: 0; }

  .btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--saffron), var(--saffron-light));
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    letter-spacing: 0.02em;
    margin-top: 8px;
    box-shadow: 0 4px 14px rgba(232, 133, 10, 0.35);
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(232, 133, 10, 0.45);
  }

  .btn:active { transform: translateY(0); }

  /* Results */
  #result { margin-top: 28px; display: none; }

  .result-box {
    border-radius: 14px;
    padding: 28px 24px;
    text-align: center;
    animation: fadeInUp 0.4s ease;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-active {
    background: var(--green-bg);
    border: 2px solid var(--green);
  }

  .result-inactive {
    background: var(--red-bg);
    border: 2px solid #FECACA;
  }

  .result-notfound {
    background: #FFF7ED;
    border: 2px solid rgba(232,133,10,0.4);
  }

  /* Big checkmark */
  .check-icon {
    width: 72px;
    height: 72px;
    background: var(--green);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .check-icon svg { width: 40px; height: 40px; }

  .x-icon {
    width: 72px;
    height: 72px;
    background: var(--red);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .result-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .result-active .result-name { color: var(--green); }
  .result-inactive .result-name { color: var(--red); }
  .result-notfound .result-name { color: var(--saffron); }

  .result-msg {
    font-size: 1.05rem;
    line-height: 1.6;
    color: var(--text);
    font-weight: 400;
  }

  .result-msg strong { font-weight: 600; }

  .valid-until {
    display: inline-block;
    margin-top: 10px;
    background: var(--green);
    color: white;
    font-size: 0.82rem;
    font-family: 'Crimson Pro', serif;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 4px 14px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  .renew-btn {
    display: inline-block;
    margin-top: 16px;
    padding: 12px 28px;
    background: var(--red);
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 600;
    transition: background 0.2s;
    box-shadow: 0 3px 10px rgba(185, 28, 28, 0.3);
  }

  .renew-btn:hover { background: #991B1B; }

  .desk-note {
    margin-top: 12px;
    font-size: 0.9rem;
    color: var(--muted);
    font-style: italic;
  }

  .reset-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Crimson Pro', serif;
    font-size: 0.9rem;
    cursor: pointer;
    text-decoration: underline;
    margin-top: 16px;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  .hint {
    font-size: 0.83rem;
    color: var(--muted);
    text-align: center;
    margin-top: 18px;
    font-style: italic;
    line-height: 1.5;
  }

  footer {
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 0.82rem;
    font-style: italic;
  }

  @media (max-width: 480px) {
    .card { padding: 24px 18px; }
    .name-row { grid-template-columns: 1fr; }
    .logo-text h1 { font-size: 1.2rem; }
  }
</style>
</head>

async function decryptMembers(password) {
  try {
    const raw = Uint8Array.from(atob(ENCRYPTED_PAYLOAD), c => c.charCodeAt(0));
    const salt  = raw.slice(0, 16);
    const nonce = raw.slice(16, 28);
    const ct    = raw.slice(28);
    const keyMat = await crypto.subtle.importKey(
      "raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]
    );
    const key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: 310000, hash: "SHA-256" },
      keyMat,
      { name: "AES-GCM", length: 256 },
      false, ["decrypt"]
    );
    const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv: nonce }, key, ct);
    return JSON.parse(new TextDecoder().decode(dec));
  } catch(e) { return null; }
}

// ── FUZZY MATCH ──────────────────────────────────────────────────
function levenshtein(a, b) {
  a = a.toLowerCase(); b = b.toLowerCase();
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => [i, ...Array(n).fill(0)]);
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function fuzzyMatch(input, target) {
  if (!input || !target) return false;
  input = input.trim().toLowerCase();
  target = target.trim().toLowerCase();
  if (input === target) return true;
  const maxLen = Math.max(input.length, target.length);
  const allowedEdits = Math.min(2, Math.floor(maxLen / 4));
  return levenshtein(input, target) <= allowedEdits;
}

function isActive(paymentDate) {
  if (!paymentDate) return false;
  const expiry = new Date(paymentDate);
  expiry.setFullYear(expiry.getFullYear() + 1);
  return new Date() <= expiry;
}
function isExpiringSoon(paymentDate) {
  if (!paymentDate) return false;
  const expiry = new Date(paymentDate);
  expiry.setFullYear(expiry.getFullYear() + 1);
  const now = new Date();
  const daysLeft = Math.ceil((expiry - now) / (1000 * 60 * 60 * 24));
  return daysLeft > 0 && daysLeft <= 90;
}

function expiryDate(ds) {
  const d = new Date(ds);
  d.setFullYear(d.getFullYear() + 1);
  return d.toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
}

// ── LOOKUP ───────────────────────────────────────────────────────
function findMember(email, firstName, lastName) {
  email = (email||'').trim().toLowerCase();
  firstName = (firstName||'').trim();
  lastName  = (lastName||'').trim();

  if (email) {
    const m = MEMBERS.find(x => x.email && x.email.toLowerCase() === email);
    if (m) return m;
  }
  if (firstName && lastName) {
    const hits = MEMBERS.filter(x => {
      const fullFirst = x.firstName.toLowerCase();
      const firstOk = fuzzyMatch(firstName, fullFirst) || fuzzyMatch(firstName, fullFirst.split(' ')[0]);
      const lastOk  = x.lastName ? fuzzyMatch(lastName, x.lastName) : false;
      return firstOk && lastOk;
    });
    if (hits.length === 1) return hits[0];
    if (hits.length > 1) return hits.find(x => x.paymentDate) || hits[0];
  }
  if (firstName && !lastName) {
    return MEMBERS.find(x => fuzzyMatch(firstName, x.firstName)) || null;
  }
  return null;
}

// ── RENDER ───────────────────────────────────────────────────────
function checkMembership() {
  if (!MEMBERS) { alert('Member data is still loading. Please wait a moment.'); return; }
  const email = document.getElementById('emailInput').value.trim();
  const first = document.getElementById('firstInput').value.trim();
  const last  = document.getElementById('lastInput').value.trim();
  if (!email && !first && !last) { alert('Please enter your email or name.'); return; }

  const member = findMember(email, first, last);
  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';

  if (!member) {
    resultEl.innerHTML = `
      <div class="result-box result-notfound">
        <div class="x-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></div>
        <div class="result-name">Member Not Found</div>
        <p class="result-msg">We could not find a matching record. Please double-check your details or visit the desk for assistance.</p>
        <a href="https://www.ragact.org" class="renew-btn" target="_blank">Visit ragact.org</a>
        <p class="desk-note">You can also verify or renew at the registration desk.</p>
        <button class="reset-btn" onclick="resetForm()">← Try again</button>
      </div>`;
    return;
  }

  const name = [member.firstName, member.lastName].filter(Boolean).join(' ') || 'Member';
  const active = isActive(member.paymentDate);

  if (active) {
    const expiringSoon = isExpiringSoon(member.paymentDate);
    const soonBanner = expiringSoon ? `
        <div style="margin-top:16px;background:#FFF7ED;border:1.5px solid #E8850A;border-radius:10px;padding:14px 16px;text-align:left;">
          <p style="font-size:0.97rem;color:#7A4200;line-height:1.6;">
            <strong style="color:#C8860A;">⏳ Membership Expiring Soon</strong><br>
            Your membership expires on <strong>${expiryDate(member.paymentDate)}</strong>. Consider renewing now to help your Raga Club team plan for the upcoming season!
          </p>
          <a href="https://www.zeffy.com/en-US/ticketing/raga-club-of-ct-annual-2026-membership" target="_blank"
             style="display:inline-block;margin-top:10px;padding:9px 20px;background:#E8850A;color:white;border-radius:8px;text-decoration:none;font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:600;box-shadow:0 2px 8px rgba(232,133,10,0.3);">
            🔗 Renew My Membership
          </a>
        </div>` : `<span class="valid-until">Valid through ${expiryDate(member.paymentDate)}</span>`;

    resultEl.innerHTML = `
      <div class="result-box result-active">
        <div class="check-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div>
        <div class="result-name">✦ ${name}</div>
        <p class="result-msg">You are an <strong>active Raga Club member</strong>.<br>Thank you for your support!<br><br><em>Please show this screen at the desk and proceed to the auditorium.</em></p>
        ${soonBanner}
        <button class="reset-btn" onclick="resetForm()">← Check another member</button>
      </div>`;
  } else {
    const lastRenewed = member.paymentDate
      ? `Your membership was last renewed on <strong>${formatDate(member.paymentDate)}</strong>.`
      : `We have you on file, but no recent payment was found.`;
    resultEl.innerHTML = `
      <div class="result-box result-inactive">
        <div class="x-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg></div>
        <div class="result-name">${name}</div>
        <p class="result-msg">${lastRenewed}<br><br>Your membership has <strong>expired</strong>. Please renew today to enjoy this season's events.<br><br><em>You can also renew at the desk — they can tap to pay for you.</em></p>
        <a href="https://www.zeffy.com/en-US/ticketing/raga-club-of-ct-annual-2026-membership" class="renew-btn" target="_blank">🔗 Click Here to Renew</a>
        <p class="desk-note">Or scan the QR code at the registration desk to renew.</p>
        <button class="reset-btn" onclick="resetForm()">← Check another member</button>
      </div>`;
  }
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetForm() {
  document.getElementById('emailInput').value = '';
  document.getElementById('firstInput').value = '';
  document.getElementById('lastInput').value = '';
  document.getElementById('result').style.display = 'none';
  document.getElementById('emailInput').focus();
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') checkMembership(); });

// ── INIT: decrypt member data silently on page load ───────────────
(async () => {
  MEMBERS = await decryptMembers(APP_PASSWORD);
  if (!MEMBERS) {
    document.querySelector('.card-sub').textContent = 'Error loading member data. Please contact the desk.';
  }
})();
</script>
